{% extends 'base.html' %} 
{% load static %}

{% block title %}Your Profile{% endblock title %}

{% block content %}

<main>
    <div class="form-container">
        <form method="POST" enctype="multipart/form-data" class="card">
            {% csrf_token %} 

            {% if user.profile %}
            <div>
                {% if user.profile.avatar %}
                <img src="{{user.profile.avatar.url}}" alt="{{ user.username }}" class="avatar" accept=".jpg,.jpeg,.png"/>
                {% else %}
                <img src="{% static "images/default-avatar.png" %}" alt="{{ user.username }}" class="avatar" accept=".jpg,.jpeg,.png"/>
                {% endif %}
            </div>
            {% endif %}

            <h2 class="text-center">{{ user.username | title }}</h2>
            <p class="text-center"><a href="mailto:{{user.email}}">{{user.email}}</a></p>
            <hr>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" value="{{user.email}}" />


            <label for="avatar">Avatar:</label>
            <input type="file" name="avatar" id="avatar">	

            <button type="submit" class="btn primary full-width">Update Profile</button>

        </form>
    </div>
</main>

{% endblock content %}
